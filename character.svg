<svg xmlns="http://www.w3.org/2000/svg" width="200" height="240" viewBox="0 0 200 240">
  <!-- Colors:
    bodyDark: #2A2A2A
    bodyLight: #3A3A3A
    facePlate: #303030
    faceBorder: #444444
    eyeOuter: #2A2A2A
    eyeOuterBorder: #555555
    eyeInner: #1A1A1A
    eyeInnerBorder: #444444
    coral: #DD614A
    antenna: #777777
    oscScreen: #0A1A0A
    oscGrid: #1A3A1A
    oscWave: #73A580
    speaker: #2A2A2A
    speakerLine: #444444
    ledOff: #333333
  -->

  <!-- Left Antenna -->
  <g id="antenna-left">
    <!-- Rod -->
    <rect x="64.5" y="20" width="3" height="30" rx="1.5" fill="#777777"/>
    <!-- Tip ball -->
    <circle cx="66" cy="19" r="4" fill="#DD614A"/>
  </g>

  <!-- Right Antenna -->
  <g id="antenna-right">
    <!-- Rod -->
    <rect x="134.5" y="20" width="3" height="30" rx="1.5" fill="#777777"/>
    <!-- Tip ball -->
    <circle cx="136" cy="19" r="4" fill="#DD614A"/>
  </g>

  <!-- Body -->
  <rect id="body" x="21" y="41" width="158" height="158" rx="24" fill="#3A3A3A" stroke="#555555" stroke-width="2"/>

  <!-- Face plate -->
  <rect id="face" x="32.5" y="52.5" width="135" height="135" rx="16" fill="#303030" stroke="#444444" stroke-width="1"/>

  <!-- Power LED -->
  <circle id="led" cx="168" cy="55" r="4" fill="#333333"/>

  <!-- Left Eye -->
  <g id="eye-left" transform="translate(48, 68)">
    <!-- Outer ring -->
    <circle cx="22" cy="22" r="21" fill="#2A2A2A" stroke="#555555" stroke-width="2"/>
    <!-- Inner ring -->
    <circle cx="22" cy="22" r="12.2" fill="#1A1A1A" stroke="#444444" stroke-width="1"/>
    <!-- Pointer (pointing up, default) -->
    <rect x="20.5" y="8.6" width="3" height="15.4" rx="1.5" fill="#DD614A"/>
    <!-- Center dot -->
    <circle cx="22" cy="22" r="2.64" fill="#DD614A"/>
  </g>

  <!-- Right Eye -->
  <g id="eye-right" transform="translate(108, 68)">
    <!-- Outer ring -->
    <circle cx="22" cy="22" r="21" fill="#2A2A2A" stroke="#555555" stroke-width="2"/>
    <!-- Inner ring -->
    <circle cx="22" cy="22" r="12.2" fill="#1A1A1A" stroke="#444444" stroke-width="1"/>
    <!-- Pointer (pointing up, default) -->
    <rect x="20.5" y="8.6" width="3" height="15.4" rx="1.5" fill="#DD614A"/>
    <!-- Center dot -->
    <circle cx="22" cy="22" r="2.64" fill="#DD614A"/>
  </g>

  <!-- Oscilloscope Mouth -->
  <g id="oscilloscope" transform="translate(45, 125)">
    <!-- Screen background -->
    <rect width="110" height="50" rx="6" fill="#0A1A0A" stroke="#555555" stroke-width="2"/>
    <!-- Grid vertical lines -->
    <line x1="27.5" y1="0" x2="27.5" y2="50" stroke="#1A3A1A" stroke-width="0.5"/>
    <line x1="55" y1="0" x2="55" y2="50" stroke="#1A3A1A" stroke-width="0.5"/>
    <line x1="82.5" y1="0" x2="82.5" y2="50" stroke="#1A3A1A" stroke-width="0.5"/>
    <!-- Grid horizontal line -->
    <line x1="0" y1="25" x2="110" y2="25" stroke="#1A3A1A" stroke-width="0.5"/>
    <!-- Wave bars (default flat/minimal state) -->
    <g id="osc-bars">
      <rect x="7"  y="24" width="6" height="2" rx="3" fill="#73A580"/>
      <rect x="17" y="22" width="6" height="6" rx="3" fill="#73A580"/>
      <rect x="27" y="19" width="6" height="12" rx="3" fill="#73A580"/>
      <rect x="37" y="16" width="6" height="18" rx="3" fill="#73A580"/>
      <rect x="47" y="13" width="6" height="24" rx="3" fill="#73A580"/>
      <rect x="52" y="11" width="6" height="28" rx="3" fill="#73A580"/>
      <rect x="62" y="13" width="6" height="24" rx="3" fill="#73A580"/>
      <rect x="72" y="16" width="6" height="18" rx="3" fill="#73A580"/>
      <rect x="82" y="19" width="6" height="12" rx="3" fill="#73A580"/>
      <rect x="92" y="22" width="6" height="6" rx="3" fill="#73A580"/>
      <rect x="102" y="24" width="6" height="2" rx="3" fill="#73A580"/>
    </g>
  </g>

  <!-- Speaker Grille -->
  <g id="speaker" transform="translate(30, 205)">
    <rect width="140" height="30" rx="8" fill="#2A2A2A" stroke="#444444" stroke-width="1"/>
    <!-- Row 1 -->
    <rect x="20" y="5"  width="16" height="2" rx="1" fill="#444444"/>
    <rect x="44" y="5"  width="16" height="2" rx="1" fill="#444444"/>
    <rect x="68" y="5"  width="16" height="2" rx="1" fill="#444444"/>
    <rect x="92" y="5"  width="16" height="2" rx="1" fill="#444444"/>
    <rect x="116" y="5" width="16" height="2" rx="1" fill="#444444"/>
    <!-- Row 2 -->
    <rect x="20" y="14"  width="16" height="2" rx="1" fill="#444444"/>
    <rect x="44" y="14"  width="16" height="2" rx="1" fill="#444444"/>
    <rect x="68" y="14"  width="16" height="2" rx="1" fill="#444444"/>
    <rect x="92" y="14"  width="16" height="2" rx="1" fill="#444444"/>
    <rect x="116" y="14" width="16" height="2" rx="1" fill="#444444"/>
    <!-- Row 3 -->
    <rect x="20" y="23"  width="16" height="2" rx="1" fill="#444444"/>
    <rect x="44" y="23"  width="16" height="2" rx="1" fill="#444444"/>
    <rect x="68" y="23"  width="16" height="2" rx="1" fill="#444444"/>
    <rect x="92" y="23"  width="16" height="2" rx="1" fill="#444444"/>
    <rect x="116" y="23" width="16" height="2" rx="1" fill="#444444"/>
  </g>
</svg>
